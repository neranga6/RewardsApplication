name: Rewards App CI and API Smoke Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build, Test, and Verify Reward APIs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run JUnit tests
        run: ./mvnw test

      - name: Build Spring Boot application
        run: ./mvnw clean package -DskipTests

      - name: Start Spring Boot application
        run: |
          nohup java -jar target/*.jar > app.log 2>&1 &
          echo "Waiting for application to start..."

          for i in {1..30}; do
            if curl -s http://localhost:8080/actuator/health | grep UP; then
              echo "Application is UP"
              break
            fi
            echo "Still waiting..."
            sleep 2
          done

      - name: Run Reward API smoke tests
        run: |
          python - <<EOF
          import requests
          import sys

          base_url = "http://localhost:8080/api/rewards"

          transaction_payload = {
              "customerId": 101,
              "customerName": "John",
              "amount": 120.50,
              "transactionDate": "2026-03-26"
          }

          try:
              # 1. Create transaction
              create_response = requests.post(
                  f"{base_url}/transactions",
                  json=transaction_payload,
                  headers={"Content-Type": "application/json"}
              )
              print("POST /api/rewards/transactions ->", create_response.status_code)
              print(create_response.text)
              assert create_response.status_code == 201, "Create transaction failed"

              # 2. Get all rewards
              get_all_response = requests.get(base_url)
              print("GET /api/rewards ->", get_all_response.status_code)
              print(get_all_response.text)
              assert get_all_response.status_code == 200, "Get all rewards failed"

              all_rewards = get_all_response.json()
              assert isinstance(all_rewards, list), "Expected rewards list"

              # 3. Get rewards by customer
              customer_id = transaction_payload["customerId"]
              get_customer_response = requests.get(f"{base_url}/{customer_id}")
              print(f"GET /api/rewards/{customer_id} ->", get_customer_response.status_code)
              print(get_customer_response.text)
              assert get_customer_response.status_code == 200, "Get rewards by customer failed"

              customer_rewards = get_customer_response.json()
              assert customer_rewards is not None, "Customer rewards response is empty"

              print("All Reward API smoke tests passed")
          except Exception as e:
              print("Smoke test failed:", str(e))
              sys.exit(1)
          EOF

      - name: Print application logs on failure
        if: failure()
        run: cat app.log