name: Rewards App CI with Python Smoke Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build application
        run: ./mvnw clean package

      - name: Start Spring Boot application
        run: |
          nohup java -jar target/*.jar > app.log 2>&1 &
          echo $! > app.pid

      - name: Wait for app startup
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/actuator/health; then
              echo "Application is ready"
              exit 0
            fi
            echo "Waiting for app..."
            sleep 5
          done
          echo "Application failed to start"
          cat app.log
          exit 1

      - name: Run Python smoke tests
        run: python .github/scripts/smoke_test.py

      - name: Upload smoke test report
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: smoke-test-report.json

      - name: Show app logs on failure
        if: failure()
        run: cat app.log

      - name: Stop application
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill $(cat app.pid) || true
          fi
